; ESP32-2432S028 "Cheap Yellow Display" (CYD)
; ILI9341 2.8" 320x240, ESP32 (оригинальный, не S3)

[env:cyd]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 460800

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bblanchon/ArduinoJson @ ^7.0.0

build_src_filter = +<*>

build_flags =
    -I include

    ; ---- TFT_eSPI — используем build_flags вместо User_Setup.h ----
    -D USER_SETUP_LOADED=1

    ; Драйвер ILI9341
    ; Для части ESP32-2432S028 клонов альтернативная инициализация работает стабильнее
    -D ILI9341_2_DRIVER=1
    -D TFT_INVERSION_OFF=1

    ; Разрешение дисплея
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320

    ; SPI пины ESP32-2432S028:
    ; Дисплей висит на VSPI (SPI3)
    -D TFT_MOSI=13
    -D TFT_MISO=12
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1

    ; Touch CS — нужно определить чтобы не мешал SPI шине (даже если тач не используем)
    -D TOUCH_CS=33

    ; Частота SPI
    -D SPI_FREQUENCY=20000000
    -D SPI_READ_FREQUENCY=20000000

    ; Шрифты GFX FreeFont
    -D LOAD_GFXFF=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1

    ; ESP32 CYD: дисплей на HSPI (SPI2) — пины 13/14/15 это аппаратный HSPI
    -D USE_HSPI_PORT=1
