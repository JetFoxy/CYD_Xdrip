    <text x="268" y="62" font-family="sans-serif" font-size="52" fill="#ffaa00"
          text-anchor="middle">↓</text>

    <text x="160" y="92" font-family="monospace" font-size="14" fill="#aaaaaa"
          text-anchor="middle">mmol/L</text>

    <text x="8" y="112" font-family="monospace" font-size="13" fill="#ffaa00">⚠ LOW  IoB:2.1U  CoB:8g</text>
    <text x="260" y="112" font-family="monospace" font-size="13" fill="#aaaaaa" text-anchor="end">1.5U 18m</text>

    <rect x="4" y="120" width="312" height="116" fill="#0a0800" stroke="#886600" stroke-width="1.5"/>
    <line x1="4" y1="140" x2="316" y2="140" stroke="#cc2222" stroke-width="1.2"/>
    <line x1="4" y1="218" x2="316" y2="218" stroke="#2255cc" stroke-width="1.2"/>

    <!-- Curve dropping toward blue threshold -->
