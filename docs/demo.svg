<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="480" height="360">
  <defs>
    <style>
      /* Cycle through 3 frames: normal → high-rising → low-falling */
      @keyframes show3 {
        0%       { opacity:1 }
        30%      { opacity:1 }
        33.4%    { opacity:0 }
        99.9%    { opacity:0 }
        100%     { opacity:1 }
      }
      @keyframes show3b {
        0%       { opacity:0 }
        33.3%    { opacity:0 }
        33.4%    { opacity:1 }
        63%      { opacity:1 }
        66.7%    { opacity:0 }
        100%     { opacity:0 }
      }
      @keyframes show3c {
        0%       { opacity:0 }
        66.6%    { opacity:0 }
        66.7%    { opacity:1 }
        96%      { opacity:1 }
        99.9%    { opacity:0 }
        100%     { opacity:0 }
      }
      .f0 { animation: show3  9s 0s infinite; }
      .f1 { animation: show3b 9s 0s infinite; }
      .f2 { animation: show3c 9s 0s infinite; }

      /* Blink the live dot */
      @keyframes blink {
        0%,49%  { opacity:1 }
        50%,100%{ opacity:0.2 }
      }
      .live-dot { animation: blink 1s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Screen background -->
  <rect width="320" height="240" fill="#000010"/>

  <!-- ════════════════════════════════════════════
       FRAME 0  –  8.9 mmol/L, trending up ↗
       ════════════════════════════════════════════ -->
  <g class="f0">
    <!-- Delta top-left -->
    <text x="8" y="22" font-family="monospace" font-size="18" fill="#00dd00">+0.3</text>

    <!-- Main BG value – large, 7-seg style green -->
    <text x="160" y="72" font-family="monospace" font-size="68" font-weight="bold"
          fill="#00ee00" text-anchor="middle" letter-spacing="4">8.9</text>

    <!-- Trend arrow ↗ top-right -->
    <text x="268" y="62" font-family="sans-serif" font-size="52" fill="#ccee00"
          text-anchor="middle">↗</text>

    <!-- mmol/L label -->
    <text x="160" y="92" font-family="monospace" font-size="14" fill="#aaaaaa"
          text-anchor="middle">mmol/L</text>

    <!-- IoB / CoB / Bolus row -->
    <text x="8"   y="112" font-family="monospace" font-size="13" fill="#00cccc">IoB:5.4U  CoB:37g</text>
    <text x="260" y="112" font-family="monospace" font-size="13" fill="#aaaaaa" text-anchor="end">0.6U 4m</text>

    <!-- Graph box -->
    <rect x="4" y="120" width="312" height="116" fill="#000820" stroke="#2244aa" stroke-width="1.5"/>

    <!-- High threshold line (red, ~10.0 mmol/L) -->
    <line x1="4" y1="140" x2="316" y2="140" stroke="#cc2222" stroke-width="1.2"/>
    <!-- Low threshold line (blue, ~3.9 mmol/L) -->
    <line x1="4" y1="218" x2="316" y2="218" stroke="#2255cc" stroke-width="1.2"/>

    <!-- Glucose dots — moderate curve with slight dip and rise to ~8.9 -->
    <!-- 36 points × 5min = 3 hours; x: 10..310 step ~8.4, y maps ~3.9(218)..10.0(140) -->
    <!-- Curve: starts ~6.5, dips to ~5.2, then rises to 8.9 -->
    <polyline
      points="10,182  18,183  27,185  35,187  44,188  52,190  61,192  69,195
              78,198  86,200  94,201  103,200  111,198  120,195  128,193  137,192
              145,191  154,190  163,189  171,187  180,185  188,183  197,181  205,179
              214,176  222,174  230,172  239,170  247,168  256,167  264,165  273,163
              281,162  290,161  298,160  307,158"
      fill="none" stroke="#00aa00" stroke-width="0.5" opacity="0.3"/>

    <!-- Dots on top of polyline -->
    <circle cx="10"  cy="182" r="2.5" fill="#00ee00"/>
    <circle cx="18"  cy="183" r="2.5" fill="#00ee00"/>
    <circle cx="27"  cy="185" r="2.5" fill="#00ee00"/>
    <circle cx="35"  cy="187" r="2.5" fill="#00ee00"/>
